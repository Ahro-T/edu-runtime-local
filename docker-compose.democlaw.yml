services:
  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edu_runtime
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edu_runtime"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      LLM_URL: http://llamacpp:8000
      LLM_MODEL: gemma-4-E4B-it
      OPENCLAW_GATEWAY_URL: http://openclaw:18789
    volumes:
      - ./vault:/app/vault
      - ./wiki-vault:/app/wiki-vault
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - democlaw-net
      - internal

  curriculum-cron:
    image: alpine:3.19
    volumes:
      - ./vault:/app/vault:ro
      - ./wiki-vault:/app/wiki-vault
      - ./scripts:/app/scripts:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Curriculum cron started"
        while true; do
          echo "[$(date -Iseconds)] Running wiki lint + index generation..."
          cd /app && bash /app/scripts/generate-index.sh 2>&1 || echo "generate-index failed"
          echo "[$(date -Iseconds)] Done. Sleeping 6h."
          sleep 21600
        done
    networks:
      - internal

networks:
  democlaw-net:
    external: true
  internal:
    driver: bridge
