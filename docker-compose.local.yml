# Local mode — Ollama + Gemma 4 E2B on local GPU
services:
  postgres:
    ports:
      - "5432:5432"

  app:
    ports:
      - "3000:3000"

  openclaw:
    ports:
      - "3100:3100"

  vllm:
    image: docker.io/ollama/ollama:latest
    devices:
      - nvidia.com/gpu=all
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 5
        ollama pull gemma4:e2b
        wait
    ports:
      - "11434:11434"

volumes:
  ollama_data:
