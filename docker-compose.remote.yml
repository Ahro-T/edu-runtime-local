# Remote mode — External vLLM server
# Ports offset: API 3001, Postgres 5433, OpenClaw 3101
services:
  postgres:
    ports:
      - "5433:5432"

  app:
    ports:
      - "3001:3000"
    environment:
      VLLM_URL: ${VLLM_REMOTE_URL:-https://llm.agentic-ai-gist.org}
      VLLM_MODEL: ${VLLM_REMOTE_MODEL:-google/gemma-4-26B-A4B-it}

  openclaw:
    ports:
      - "3101:3100"
