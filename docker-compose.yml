services:
  postgres:
    image: docker.io/library/postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edu_runtime
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edu_runtime"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama:
    image: docker.io/ollama/ollama:latest
    devices:
      - nvidia.com/gpu=all
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        until ollama list >/dev/null 2>&1; do sleep 1; done
        ollama pull gemma4:e2b
        wait
    ports:
      - "11434:11434"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./vault:/app/vault
      - ./wiki-vault:/app/wiki-vault
    depends_on:
      - postgres
      - ollama
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    ports:
      - "18789:18789"
    environment:
      DISCORD_BOT_TOKEN: ${OPENCLAW_DISCORD_TOKEN}
    volumes:
      - ./workspaces/teacher:/workspace
    depends_on:
      - app

  curriculum-cron:
    image: alpine:3.19
    volumes:
      - ./vault:/app/vault:ro
      - ./wiki-vault:/app/wiki-vault
      - ./scripts:/app/scripts:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Curriculum cron started"
        while true; do
          echo "[$(date -Iseconds)] Running wiki lint + index generation..."
          cd /app && bash /app/scripts/generate-index.sh 2>&1 || echo "generate-index failed"
          echo "[$(date -Iseconds)] Done. Sleeping 6h."
          sleep 21600
        done

volumes:
  ollama_data:
