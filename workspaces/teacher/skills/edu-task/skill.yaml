entry_point: task.mjs
input_schema:
  type: object
  properties:
    pillar:
      type: string
      description: "Learning pillar"
      default: "agents"
output_schema:
  type: object
  properties:
    message:
      type: string
      description: "Complete Discord message with 5-slot assessment"
